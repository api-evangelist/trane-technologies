aid: trane-technologies
name: Trane Technologies
description: >-
  Trane Technologies plc (NYSE: TT) is an Ireland-domiciled global climate
  innovator that designs, manufactures, sells, and services heating,
  ventilation, air conditioning (HVAC), transport refrigeration, and
  building-automation systems. The company operates through two reportable
  segments — the Americas and EMEA / Asia Pacific — under the Trane,
  Thermo King, and American Standard Heating & Air Conditioning brands.
  Spun off from Ingersoll-Rand in 2020, Trane Technologies reported
  approximately US$23.9B in 2025 revenue, ~45,000 employees, and
  operations across 61 countries. Its digital surface centers on
  Trane Connect (cloud building portal), Tracer SC+ / Symbio controllers
  for commercial building automation, and the Thermo King TracKing /
  ConnectedSuite telematics platform for transport refrigeration.
type: Index
position: Provider
access: Partner
